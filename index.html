<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Saint of the Day - Catholic Children's Devotional">
    <meta name="author" content="SHIJI KJ">
    <title>Saint of the Day - Daily Catholic Devotional by SHIJI KJ</title>
    
    <link rel="stylesheet" href="src/styles.css">
    <link rel="stylesheet" href="src/print.css" media="print">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Saint of the Day</h1>
            <p class="author">By SHIJI KJ</p>
            
            <div class="controls">
                <label for="date-input">Select Date:</label>
                <input type="date" id="date-input" />
                <button id="today-btn">Today</button>
                <button id="random-btn">Random Day</button>
                <span id="date-display" class="date-display"></span>
            </div>
        </header>

        <nav class="pagination">
            <button id="prev-btn" class="nav-btn">← Previous</button>
            <span id="page-counter"></span>
            <button id="next-btn" class="nav-btn">Next →</button>
        </nav>

        <main id="daily-content" class="daily-page">
            <!-- Daily content loads here -->
        </main>

        <div class="actions">
            <button id="print-btn" class="export-btn">🖨️ Print / PDF</button>
            <button id="export-word-btn" class="export-btn">📄 Export to Word</button>
            <button id="export-monthly-btn" class="export-btn">📅 Export Month</button>
            <button id="export-book-btn" class="export-btn">📖 Export Full Book</button>
            <button id="edit-mode-btn" class="export-btn" style="background-color: #27ae60;">✏️ Add/Edit Entry</button>
        </div>

        <!-- Editor Modal -->
        <div id="editor-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Add/Edit Daily Entry</h2>
                
                <div class="form-group">
                    <label>Date (MM-DD):</label>
                    <input type="text" id="editor-date" placeholder="01-15" maxlength="5" />
                </div>

                <div class="form-group">
                    <label>Saint Name:</label>
                    <input type="text" id="editor-saint" placeholder="Saint ___" />
                </div>

                <div class="form-group">
                    <label>Prayer (3-4 lines):</label>
                    <textarea id="editor-prayer" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label>Scripture Reference (Book Chapter:Verse):</label>
                    <input type="text" id="editor-scripture" placeholder="John 3:16" />
                </div>

                <div class="form-group">
                    <label>Scripture Text (Exact Douay-Rheims):</label>
                    <textarea id="editor-scripture-text" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label>Meaning (1 sentence):</label>
                    <textarea id="editor-meaning" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>Story (2-3 paragraphs):</label>
                    <textarea id="editor-story" rows="6"></textarea>
                </div>

                <div class="form-group">
                    <label>Today's Thought (1 sentence):</label>
                    <textarea id="editor-thought" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>Today's Action (under 1 minute):</label>
                    <textarea id="editor-action" rows="2"></textarea>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button id="save-entry-btn" class="export-btn">💾 Save Entry</button>
                    <button id="cancel-edit-btn" class="export-btn" style="background-color: #e74c3c;">❌ Cancel</button>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 SHIJI KJ. All rights reserved.</p>
            <p>Scripture quotations are from the Douay-Rheims Bible (Public Domain).</p>
        </footer>
    </div>

    <script src="src/daily-data.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
