<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saint of the Day - Front Cover</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: 'Playfair Display', serif;
        }

        .cover-container {
            width: 6in;
            height: 9in;
            background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            text-align: center;
        }

        /* Sky gradient background with clouds */
        .sky {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #87ceeb 0%, #b0e0e6 50%, #ffffff 100%);
            z-index: 1;
        }

        /* Cloud shapes (CSS pseudo-elements) */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.8;
        }

        .cloud1 {
            width: 80px;
            height: 30px;
            top: 15%;
            left: 10%;
        }

        .cloud2 {
            width: 120px;
            height: 40px;
            top: 35%;
            right: 15%;
            opacity: 0.6;
        }

        .cloud3 {
            width: 100px;
            height: 35px;
            top: 55%;
            left: 20%;
            opacity: 0.7;
        }

        /* Illustration area - SVG will be embedded here */
        .illustration {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
        }

        /* Cover content */
        .content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 700;
            color: #2c5282;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
            margin-top: 2rem;
        }

        .author {
            font-size: 1.5rem;
            color: #4a5568;
            font-style: italic;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.3);
            margin-bottom: 2rem;
        }

        @media print {
            .cover-container {
                box-shadow: none;
                width: 100%;
                height: 100%;
                padding: 0.5in;
            }

            body {
                background: white;
            }
        }
    </style>
</head>
<body>
    <div class="cover-container">
        <!-- Background clouds -->
        <div class="sky">
            <div class="cloud cloud1"></div>
            <div class="cloud cloud2"></div>
            <div class="cloud cloud3"></div>
        </div>

        <!-- SVG Illustration -->
        <svg class="illustration" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
            <!-- Blue sky background -->
            <defs>
                <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:0.3" />
                    <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.3" />
                </linearGradient>

                <radialGradient id="jesusGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.2" />
                    <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0" />
                </radialGradient>
            </defs>

            <!-- Soft clouds using ellipses -->
            <ellipse cx="80" cy="60" rx="50" ry="25" fill="white" opacity="0.7" />
            <ellipse cx="120" cy="70" rx="40" ry="20" fill="white" opacity="0.6" />
            <ellipse cx="320" cy="100" rx="45" ry="22" fill="white" opacity="0.65" />
            <ellipse cx="350" cy="115" rx="35" ry="18" fill="white" opacity="0.6" />

            <!-- Jesus seated figure -->
            <!-- Glow around Jesus -->
            <circle cx="200" cy="250" r="120" fill="url(#jesusGlow)" />

            <!-- Robe (simple geometric shape) -->
            <ellipse cx="200" cy="320" rx="80" ry="100" fill="#c084b8" />

            <!-- Underrobe -->
            <path d="M 120 220 Q 120 350 140 400 Q 200 420 260 400 Q 280 350 280 220 Z" fill="#d4a5d4" />

            <!-- Head -->
            <circle cx="200" cy="180" r="35" fill="#e8c9a3" />

            <!-- Hair -->
            <path d="M 165 155 Q 200 140 235 155 Q 235 180 220 200 Q 200 210 180 200 Q 165 180 165 155 Z" fill="#8b6f47" />

            <!-- Halo -->
            <circle cx="200" cy="180" r="45" fill="none" stroke="#ffd700" stroke-width="3" stroke-dasharray="5,5" opacity="0.8" />

            <!-- Face (simple) -->
            <!-- Left eye -->
            <circle cx="185" cy="175" r="3" fill="#2c5282" />
            <!-- Right eye -->
            <circle cx="215" cy="175" r="3" fill="#2c5282" />
            <!-- Smile -->
            <path d="M 190 190 Q 200 195 210 190" stroke="#8b6f47" stroke-width="2" fill="none" stroke-linecap="round" />

            <!-- Arms holding Bible -->
            <!-- Left arm -->
            <path d="M 160 250 Q 140 270 130 300" stroke="#e8c9a3" stroke-width="12" fill="none" stroke-linecap="round" />
            <!-- Right arm -->
            <path d="M 240 250 Q 260 270 270 300" stroke="#e8c9a3" stroke-width="12" fill="none" stroke-linecap="round" />

            <!-- Bible in right hand -->
            <g transform="translate(260, 290) rotate(25)">
                <rect width="50" height="70" fill="#8b0000" rx="3" />
                <rect x="2" y="2" width="46" height="66" fill="#a00000" rx="2" />
                <line x1="27" y1="5" x2="27" y2="65" stroke="#8b7355" stroke-width="1" />
                <text x="25" y="40" font-size="8" fill="gold" text-anchor="middle" font-weight="bold">Bible</text>
            </g>

            <!-- Children sitting beside Jesus -->
            <!-- Child 1 (left) -->
            <g transform="translate(100, 320)">
                <!-- Body -->
                <ellipse cx="0" cy="30" rx="20" ry="35" fill="#ff69b4" />
                <!-- Head -->
                <circle cx="0" cy="-5" r="15" fill="#e8c9a3" />
                <!-- Hair -->
                <path d="M -12 -10 Q 0 -20 12 -10" fill="#8b6f47" />
                <!-- Left arm -->
                <path d="M -15 20 L -30 35" stroke="#e8c9a3" stroke-width="5" stroke-linecap="round" />
                <!-- Right arm -->
                <path d="M 15 20 L 30 35" stroke="#e8c9a3" stroke-width="5" stroke-linecap="round" />
                <!-- Legs -->
                <line x1="-10" y1="60" x2="-10" y2="85" stroke="#4a7c8c" stroke-width="5" stroke-linecap="round" />
                <line x1="10" y1="60" x2="10" y2="85" stroke="#4a7c8c" stroke-width="5" stroke-linecap="round" />
            </g>

            <!-- Child 2 (right) -->
            <g transform="translate(300, 340)">
                <!-- Body -->
                <ellipse cx="0" cy="30" rx="18" ry="32" fill="#87ceeb" />
                <!-- Head -->
                <circle cx="0" cy="-5" r="13" fill="#e8c9a3" />
                <!-- Hair -->
                <path d="M -10 -8 Q 0 -18 10 -8" fill="#8b6f47" />
                <!-- Left arm -->
                <path d="M -13 20 L -28 32" stroke="#e8c9a3" stroke-width="4" stroke-linecap="round" />
                <!-- Right arm -->
                <path d="M 13 20 L 28 32" stroke="#e8c9a3" stroke-width="4" stroke-linecap="round" />
                <!-- Legs -->
                <line x1="-8" y1="58" x2="-8" y2="80" stroke="#8b4513" stroke-width="4" stroke-linecap="round" />
                <line x1="8" y1="58" x2="8" y2="80" stroke="#8b4513" stroke-width="4" stroke-linecap="round" />
            </g>

            <!-- Child 3 (center) -->
            <g transform="translate(200, 350)">
                <!-- Body -->
                <ellipse cx="0" cy="30" rx="17" ry="30" fill="#dda0dd" />
                <!-- Head -->
                <circle cx="0" cy="-5" r="12" fill="#e8c9a3" />
                <!-- Hair -->
                <path d="M -9 -7 Q 0 -17 9 -7" fill="#8b6f47" />
                <!-- Looking up -->
                <!-- Left eye -->
                <circle cx="-4" cy="-8" r="1.5" fill="#2c5282" />
                <!-- Right eye -->
                <circle cx="4" cy="-8" r="1.5" fill="#2c5282" />
                <!-- Smile -->
                <path d="M -3 0 Q 0 3 3 0" stroke="#8b6f47" stroke-width="1.5" fill="none" stroke-linecap="round" />
            </g>

            <!-- Decorative rays of light -->
            <g opacity="0.3" stroke="#ffd700" stroke-width="2" stroke-linecap="round">
                <line x1="200" y1="100" x2="200" y2="50" />
                <line x1="240" y1="140" x2="270" y2="110" />
                <line x1="160" y1="140" x2="130" y2="110" />
                <line x1="250" y1="200" x2="290" y2="200" />
                <line x1="150" y1="200" x2="110" y2="200" />
            </g>
        </svg>

        <!-- Cover text (overlaid on illustration) -->
        <div class="content">
            <div class="title">Saint of the Day</div>
            <div class="author">By SHIJI KJ</div>
        </div>
    </div>
</body>
</html>
